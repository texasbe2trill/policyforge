# Production SRE Policy
# Tiered escalation model for SRE teams. Read operations are free,
# restarts require approval, and scaling is limited to senior SREs.

safety_tiers:
  - name: "read_only"
    requires_approval: false
  - name: "supervised_write"
    requires_approval: true
  - name: "autonomous_write"
    requires_approval: false

roles:
  - name: "sre-lead"
    allowed_actions: ["read", "restart", "scale", "deploy", "rollback"]
    allowed_tiers: ["read_only", "supervised_write", "autonomous_write"]
    max_tier: "autonomous_write"
    allowed_resources:
      - "prod/api"
      - "prod/worker"
      - "prod/cache"
      - "staging/api"
      - "staging/worker"

  - name: "sre"
    allowed_actions: ["read", "restart", "scale"]
    allowed_tiers: ["read_only", "supervised_write"]
    max_tier: "supervised_write"
    allowed_resources:
      - "prod/api"
      - "prod/worker"
      - "staging/api"
      - "staging/worker"

  - name: "oncall"
    allowed_actions: ["read", "restart"]
    allowed_tiers: ["read_only", "supervised_write"]
    max_tier: "supervised_write"
    allowed_resources:
      - "prod/api"
      - "prod/worker"
      - "prod/cache"

  - name: "readonly"
    allowed_actions: ["read"]
    allowed_tiers: ["read_only"]
    max_tier: "read_only"
    allowed_resources:
      - "prod/api"
      - "prod/worker"
      - "prod/cache"
      - "staging/api"
      - "staging/worker"

resources:
  - name: "prod/api"
    requires_approval: true
  - name: "prod/worker"
    requires_approval: true
  - name: "prod/cache"
    requires_approval: true
  - name: "staging/api"
    requires_approval: false
  - name: "staging/worker"
    requires_approval: false

agent_envelopes:
  - name: "deploy-bot"
    allowed_resources:
      - "staging/*"
    allowed_actions:
      - "deploy"
      - "read"
    max_tier: "autonomous_write"
    session_ttl_minutes: 20

  - name: "monitoring-agent"
    allowed_resources:
      - "prod/*"
    allowed_actions:
      - "read"
    max_tier: "read_only"
    session_ttl_minutes: 60
