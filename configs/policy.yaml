safety_tiers:
  - name: "read_only"
    requires_approval: false
  - name: "supervised_write"
    requires_approval: true
  - name: "autonomous_write"
    requires_approval: false

roles:
  - name: "admin"
    allowed_actions:
      - "read"
      - "write"
      - "restart"
      - "scale"
    allowed_tiers:
      - "read_only"
      - "supervised_write"
      - "autonomous_write"
    max_tier: "autonomous_write"
    allowed_resources:
      - "prod/payment-service"
      - "prod/api-gateway"
      - "staging/payment-service"
  - name: "operator"
    allowed_actions:
      - "read"
      - "restart"
      - "scale"
    allowed_tiers:
      - "read_only"
      - "supervised_write"
    max_tier: "supervised_write"
    allowed_resources:
      - "prod/payment-service"
      - "staging/payment-service"
  - name: "auditor"
    allowed_actions:
      - "read"
    allowed_tiers:
      - "read_only"
    max_tier: "read_only"
    allowed_resources:
      - "prod/payment-service"
      - "prod/api-gateway"
      - "staging/payment-service"
  - name: "viewer"
    allowed_actions:
      - "read"
    allowed_tiers:
      - "read_only"
    max_tier: "read_only"
    allowed_resources:
      - "staging/payment-service"

resources:
  - name: "prod/payment-service"
    requires_approval: true
  - name: "prod/api-gateway"
    requires_approval: true
  - name: "staging/payment-service"
    requires_approval: false

agent_envelopes:
  - name: "remediation-bot"
    allowed_resources:
      - "staging/*"
    allowed_actions:
      - "read"
      - "restart"
    max_tier: "autonomous_write"
    session_ttl_minutes: 30

  - name: "prod-operator-bot"
    allowed_resources:
      - "prod/payment-service"
    allowed_actions:
      - "read"
    max_tier: "read_only"
    session_ttl_minutes: 15
